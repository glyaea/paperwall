<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="wallpaper.css">
</head>
<body>
	<video
		autoplay
		loop
		muted
		playsinline
		src="{{video_url}}"
		style="object-fit: {{object_fit}}"
	></video>
	<script>
		const video = document.querySelector("video");

		video.addEventListener("error", () => {
			const error = video.error;
			const code = error ? error.code : "unknown";
			window.ipc.postMessage(`Playing wallpaper failed | code=${code}`);
		});

		video.addEventListener("playing", () => {
			window.setTimeout(() => {
				const message = `Playing wallpaper | ${video.videoWidth}x${video.videoHeight}`;
				window.ipc.postMessage(
					`${message} | t=${video.currentTime.toFixed(2)}`
				);
			}, 1000);
		}, { once: true });

		window.paperwall = {
			setScalingMode(scalingMode) {
				video.style.objectFit = scalingMode === "{{fill_screen}}" ? "cover" : "contain";
			},
			setVideoSource(source) {
				video.src = source;
				video.load();
				video.play();
			}
		};

		video.play();
	</script>
</body>
</html>
